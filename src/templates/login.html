<!-- 登录页 — 统一登录入口，支持 admin/teacher/student 三种角色 -->
{% extends "base.html" %}{% block title %}登录{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top:60px"><div class="col-md-4">
<div class="card p-4"><h3 class="text-center mb-3"><i class="bi bi-mortarboard-fill"></i> 学生管理系统</h3>
<form method="POST">
<div class="mb-3"><label class="form-label">用户名</label><input name="username" class="form-control" value="admin" required></div>
<div class="mb-3"><label class="form-label">密码</label><input type="password" name="password" class="form-control" value="123456" required></div>
<button class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> 登 录</button>
</form>
</div></div></div>{% endblock %}
