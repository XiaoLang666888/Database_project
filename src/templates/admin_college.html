<!-- 学院管理 — 查看/新增/编辑/删除学院 -->
{% extends "base.html" %}{% block title %}学院管理{% endblock %}
{% block content %}<h4 class="mb-3"><i class="bi bi-building"></i> 学院管理</h4>
<button class="btn btn-primary btn-sm mb-3" data-bs-toggle="modal" data-bs-target="#addM"><i class="bi bi-plus-circle"></i> 新增学院</button>
<div class="card">
<table class="table table-hover mb-0"><thead><tr><th>编号</th><th>学院名称</th><th>院长</th><th>描述</th><th style="width:120px">操作</th></tr></thead><tbody>
{% for cl in colleges %}<tr><td>{{ cl[0] }}</td><td>{{ cl[1] }}</td><td>{{ cl[2] or '-' }}</td><td class="text-truncate" style="max-width:200px">{{ cl[3] or '' }}</td>
<td>
<button class="btn btn-outline-primary btn-action" onclick="editCollege({{cl[0]}},'{{cl[1]}}','{{cl[2] or ''}}','{{cl[3] or ''}}')"><i class="bi bi-pencil"></i></button>
<a href="/admin/college/del/{{ cl[0] }}" class="btn btn-outline-danger btn-action" onclick="return confirm('确定删除学院 {{ cl[1] }} 吗？')"><i class="bi bi-trash"></i></a>
</td></tr>{% endfor %}</tbody></table></div>

<!-- Add Modal -->
<div class="modal fade" id="addM"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>新增学院</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<form method="POST" action="/admin/college/add"><div class="modal-body">
<div class="mb-3"><label>学院名称</label><input name="name" class="form-control" required></div>
<div class="mb-3"><label>院长</label><input name="dean" class="form-control"></div>
<div class="mb-3"><label>描述</label><textarea name="description" class="form-control" rows="2"></textarea></div></div>
<div class="modal-footer"><button class="btn btn-primary">添加</button></div></form></div></div></div>

<!-- Edit Modal -->
<div class="modal fade" id="editM"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>编辑学院</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<form id="editForm" method="POST"><div class="modal-body">
<div class="mb-3"><label>学院名称</label><input name="name" id="editName" class="form-control" required></div>
<div class="mb-3"><label>院长</label><input name="dean" id="editDean" class="form-control"></div>
<div class="mb-3"><label>描述</label><textarea name="description" id="editDesc" class="form-control" rows="2"></textarea></div></div>
<div class="modal-footer"><button class="btn btn-primary">保存修改</button></div></form></div></div></div>

<script>
function editCollege(id,name,dean,desc){
    document.getElementById('editForm').action='/admin/college/edit/'+id;
    document.getElementById('editName').value=name;
    document.getElementById('editDean').value=dean;
    document.getElementById('editDesc').value=desc;
    new bootstrap.Modal(document.getElementById('editM')).show();
}
</script>
{% endblock %}
