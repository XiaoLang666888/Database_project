<!-- 教师管理 — 查看/新增/编辑/删除教师，关联学院 -->
{% extends "base.html" %}{% block title %}教师管理{% endblock %}
{% block content %}<h4><i class="bi bi-person-workspace"></i> 教师管理</h4>
<button class="btn btn-primary btn-sm mb-3" data-bs-toggle="modal" data-bs-target="#addM"><i class="bi bi-plus-circle"></i> 新增教师</button>
<div class="card"><table class="table table-hover mb-0"><thead><tr><th>编号</th><th>姓名</th><th>性别</th><th>职称</th><th>所属学院</th><th>操作</th></tr></thead><tbody>
{% for t in teachers %}<tr><td>{{ t[0] }}</td><td>{{ t[1] }}</td><td>{{ '男' if t[2]=='M' else '女' }}</td><td>{{ t[3] or '-' }}</td><td>{{ t[5] or '-' }}</td><td>
<button class="btn btn-outline-warning btn-action me-1" onclick="editTeacher('{{ t[0] }}','{{ t[1] }}','{{ t[2] }}','{{ t[3] or '' }}','{{ t[4] or '' }}')" title="编辑"><i class="bi bi-pencil"></i></button>
<a href="/admin/teacher/del/{{ t[0] }}" class="btn btn-outline-danger btn-action" onclick="return confirm('确定删除?')"><i class="bi bi-trash"></i></a></td></tr>{% endfor %}</tbody></table></div>
<div class="modal fade" id="addM"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>新增教师</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<form method="POST" action="/admin/teacher/add"><div class="modal-body"><div class="mb-3"><label>姓名</label><input name="name" class="form-control" required></div><div class="mb-3"><label>性别</label><select name="gender" class="form-select"><option value="M">男</option><option value="F">女</option></select></div><div class="mb-3"><label>职称</label><input name="title" class="form-control"></div><div class="mb-3"><label>所属学院</label><select name="college_id" class="form-select"><option value="">未分配</option>{% for c in colleges %}<option value="{{ c[0] }}">{{ c[1] }}</option>{% endfor %}</select></div></div><div class="modal-footer"><button class="btn btn-primary">添加</button></div></form></div></div></div>

<!-- 编辑教师 Modal -->
<div class="modal fade" id="editM"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>编辑教师 #<span id="editTno"></span></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<form id="editForm" method="POST"><div class="modal-body"><div class="mb-3"><label>姓名</label><input name="name" id="editName" class="form-control" required></div><div class="mb-3"><label>性别</label><select name="gender" id="editGender" class="form-select"><option value="M">男</option><option value="F">女</option></select></div><div class="mb-3"><label>职称</label><input name="title" id="editTitle" class="form-control"></div><div class="mb-3"><label>所属学院</label><select name="college_id" id="editCollege" class="form-select"><option value="">未分配</option>{% for c in colleges %}<option value="{{ c[0] }}">{{ c[1] }}</option>{% endfor %}</select></div></div><div class="modal-footer"><button class="btn btn-warning">保存修改</button></div></form></div></div></div>

<script>
function editTeacher(tno,name,gender,title,cid){
    document.getElementById('editForm').action='/admin/teacher/edit/'+tno;
    document.getElementById('editTno').textContent=tno;
    document.getElementById('editName').value=name;
    document.getElementById('editGender').value=gender;
    document.getElementById('editTitle').value=title;
    var sel=document.getElementById('editCollege');
    for(var i=0;i<sel.options.length;i++){if(sel.options[i].value==cid){sel.selectedIndex=i;break;}}
    new bootstrap.Modal(document.getElementById('editM')).show();
}
</script>
{% endblock %}
